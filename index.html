<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚾ Dingers Only Pool</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#080810;--card:#0f0f1a;--border:#1e1e30}
  body{background:var(--bg);color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh}
  header{background:linear-gradient(180deg,#0d0d1e,transparent);border-bottom:2px solid #ff444430;padding:16px 16px 0}
  .league-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.8rem,5vw,2.8rem);letter-spacing:4px;background:linear-gradient(90deg,#ff4444,#ffaa00);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .league-sub{font-size:0.6rem;color:#555;letter-spacing:3px;margin-top:2px}
  .tabs{display:flex;overflow-x:auto;scrollbar-width:none;margin-top:12px}
  .tabs::-webkit-scrollbar{display:none}
  .tab{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;padding:8px 16px;border:none;background:none;cursor:pointer;color:#444;border-bottom:3px solid transparent;white-space:nowrap;transition:color .2s,border-color .2s}
  main{max-width:860px;margin:0 auto;padding:20px 14px}
  .lb-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;color:#ff4444;margin-bottom:14px}
  .lb-row{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:12px;margin-bottom:8px;border:1px solid}
  .medal{font-size:1.6rem;width:36px;text-align:center;flex-shrink:0}
  .lb-name{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:2px;flex:1}
  .lb-score{font-family:'Bebas Neue',sans-serif;font-size:3rem;line-height:1}
  .lb-bar-wrap{height:5px;background:rgba(255,255,255,.07);border-radius:3px;margin-top:6px;overflow:hidden}
  .lb-bar{height:100%;border-radius:3px}
  .lb-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
  .tag{font-size:0.65rem;padding:2px 8px;border-radius:20px;font-weight:600}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:22px}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
  .stat-icon{font-size:1.4rem;margin-bottom:4px}
  .stat-label{font-size:0.58rem;color:#555;letter-spacing:2px;margin-bottom:3px}
  .stat-val{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:#fff}
  .team-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px}
  .team-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.8rem,6vw,2.8rem);letter-spacing:3px;line-height:1}
  .team-sub{font-size:0.62rem;color:#555;letter-spacing:2px;margin-top:3px}
  .team-total-label{font-size:0.58rem;color:#555;letter-spacing:2px;text-align:right}
  .team-total-num{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;line-height:1;text-align:right}
  .players-list{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .player-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #16161f}
  .player-row:last-child{border-bottom:none}
  .player-row.empty{opacity:.28}
  .pos-tag{font-size:0.58rem;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:4px;flex-shrink:0;min-width:28px;text-align:center}
  .player-name{flex:1;font-size:0.85rem;font-weight:600;color:#ddd}
  .empty-name{color:#333;font-weight:400;font-style:italic}
  .proj-badge{font-size:0.58rem;color:#444;flex-shrink:0}
  .hr-controls{display:flex;align-items:center;gap:5px;flex-shrink:0}
  .hr-btn{border:none;cursor:pointer;border-radius:5px;font-family:'Bebas Neue',sans-serif;font-size:1rem;padding:2px 10px;line-height:1.4}
  .hr-num{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;min-width:34px;text-align:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:3px 0}
  .open-slots-box{margin-top:14px;padding:10px 14px;background:#ffffff08;border-radius:8px;border:1px dashed #333}
  .pill{font-size:0.58rem;font-weight:700;letter-spacing:1px;padding:2px 8px;border-radius:12px;border:1px dashed;display:inline-block}
  .proj-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;color:#ffaa00;margin-bottom:4px}
  .proj-sub{font-size:0.62rem;color:#555;letter-spacing:2px;margin-bottom:18px}
  .proj-standings{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;margin-bottom:22px}
  .proj-card{background:var(--card);border:1px solid;border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px}
  .proj-rank{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;min-width:28px}
  .proj-team-name{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px}
  .proj-total{font-family:'Bebas Neue',sans-serif;font-size:2rem;line-height:1;margin-left:auto}
  .proj-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;margin-bottom:3px;background:var(--card);border:1px solid var(--border)}
  .proj-bar-wrap{width:100px;height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;flex-shrink:0}
  .proj-bar{height:100%;border-radius:3px}
  .proj-num{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;min-width:30px;text-align:right;flex-shrink:0}
  .draft-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;color:#a78bfa;margin-bottom:4px}
  .draft-sub{font-size:0.62rem;color:#555;letter-spacing:2px;margin-bottom:18px}
  .draft-card{border:1px solid;border-radius:12px;padding:14px 16px;margin-bottom:10px}
  .dinger-pop{position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);font-size:4rem;pointer-events:none;z-index:999;animation:dingerFly .85s ease-out forwards}
  @keyframes dingerFly{0%{opacity:1;transform:translate(-50%,-50%) scale(.4) rotate(-15deg)}50%{opacity:1;transform:translate(-50%,-140%) scale(1.5) rotate(8deg)}100%{opacity:0;transform:translate(-50%,-250%) scale(.7) rotate(25deg)}}
  .page{display:none}
  .page.active{display:block;animation:fadeIn .2s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<header>
  <div style="max-width:860px;margin:0 auto">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="font-size:2rem">⚾</div>
      <div>
        <div class="league-title">DINGERS ONLY POOL</div>
        <div class="league-sub">1 PT PER HOME RUN · 2026 SEASON · ✅ DRAFT COMPLETE</div>

    </div>
    <div class="tabs" id="tabs"></div>

</header>
<main id="main"></main>

const PROJ = {
  'Aaron Judge':50,'Matt Olson':32,'Francisco Lindor':22,'Corey Seager':28,
  'Jazz Chisholm':28,'Shea Langeliers':24,'Riley Greene':36,'Jo Adell':22,
  'Byron Buxton':28,'Kyle Tucker':30,'Colson Montgomery':26,
  'Shohei Ohtani':48,'Bryce Harper':28,'Nick Kurtz':20,'Bobby Witt Jr.':28,
  'Ronald Acuna Jr.':26,'Roman Anthony':18,'Mike Trout':26,
  'Hunter Goodman':24,'Pete Crow-Armstrong':20,'Seiya Suzuki':18,
  'Junior Caminero':26,'Eugenio Suarez':34,
  'Brandon Lowe':16,'Jackson Holliday':18,'Zach Neto':16,
  'Cal Raleigh':38,'Pete Alonso':35,'Vlad Guerrero Jr.':32,'Jose Ramirez':26,
  'Gunnar Henderson':27,'Munetaka Murakami':24,'Alejandro Kirk':14,
  'Teoscar Hernandez':26,'James Wood':33,'Brent Rooker':32,
  'Mookie Betts':18,'George Springer':18,'Cody Bellinger':18,
  'Jose Altuve':16,'Marcus Semien':18,'Ben Rice':26,
  'Kyle Schwarber':43,'Juan Soto':36,'Yordan Alvarez':30,
  'Fernando Tatis Jr.':30,'Manny Machado':28,'Elly De La Cruz':27,
  'Rafael Devers':30,'Francisco Alvarez':20,'Ketel Marte':22,'Julio Rodriguez':30,
  'Vinnie Pasquantino':18,'Austin Riley':28,'Marcell Ozuna':28,
  'Nolan Gorman':24,'Alex Bregman':26,'Will Smith':22,
  'William Contreras':22,'Ozzie Albies':20,'Gerardo Perdomo':10,'Taylor Ward':18,'Gleyber Torres':18,'Austin Wells':22,
};

let activeTab = 'TODAY';

const lbl = k => k==='KYLE' ? 'KYLE ★' : k;
const getTotal = k => TEAMS[k].players.reduce((s,p)=>s+(p.hr||0),0);
const getProjTotal = k => TEAMS[k].players.reduce((s,p)=>s+(p.name?(PROJ[p.name]||0):0),0);
const getOpen = k => TEAMS[k].players.filter(p=>!p.name);

function showDinger(){
  const el=document.createElement('div');
  el.className='dinger-pop';el.textContent='💥⚾';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),900);
}

function renderTabs(){
  const keys=['TODAY','LEADERBOARD','PROJECTIONS','RULES','DRAFT',...Object.keys(TEAMS)];
  document.getElementById('tabs').innerHTML=keys.map(k=>{
    const c=k==='TODAY'?'#38bdf8':k==='LEADERBOARD'?'#ff4444':k==='PROJECTIONS'?'#ffaa00':k==='RULES'?'#ffaa00':k==='DRAFT'?'#a78bfa':TEAMS[k].color;
    const active=k===activeTab;
    return `<button class="tab" style="color:${active?c:'#444'};border-bottom:3px solid ${active?c:'transparent'}" onclick="switchTab('${k}')">${lbl(k)}</button>`;
  }).join('');
}

function renderLeaderboard(){
  const sorted=Object.keys(TEAMS).sort((a,b)=>getTotal(b)-getTotal(a));
  const max=Math.max(...sorted.map(getTotal),1);
  const medals=['🥇','🥈','🥉','💀'];
  const rows=sorted.map((k,i)=>{
    const t=TEAMS[k];const tot=getTotal(k);
    const top=t.players.filter(p=>p.name&&p.hr>0).sort((a,b)=>b.hr-a.hr);
    const tags=top.map(p=>`<span class="tag" style="background:${t.color}20;color:${t.color}">${p.name.split(' ').pop()} (${p.hr})</span>`).join('');
    return `<div class="lb-row" style="background:${t.color}12;border-color:${t.color}30">
      <div class="medal">${medals[i]}</div>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <div class="lb-name" style="color:${t.color}">${lbl(k)}</div>
          <div class="lb-score" style="color:${t.color}">${tot}</div>
        </div>
        <div class="lb-bar-wrap"><div class="lb-bar" style="width:${Math.max((tot/max)*100,2)}%;background:linear-gradient(90deg,${t.color},${t.accent})"></div></div>
        ${top.length?`<div class="lb-tags">${tags}</div>`:'<div style="font-size:0.63rem;color:#444;margin-top:6px">Season hasn\'t started yet</div>'}
      </div>
    </div>`;
  }).join('');
  const allHR=Object.values(TEAMS).reduce((s,t)=>s+t.players.reduce((a,p)=>a+(p.hr||0),0),0);
  let top={name:'—',hr:0};
  Object.values(TEAMS).forEach(t=>t.players.forEach(p=>{if(p.name&&p.hr>top.hr)top=p;}));
  return `<div class="lb-title">⚾ 2026 STANDINGS</div>${rows}
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-icon">⚾</div><div class="stat-label">Total Dingers</div><div class="stat-val">${allHR}</div></div>
    <div class="stat-card"><div class="stat-icon">🏆</div><div class="stat-label">HR Leader</div><div class="stat-val" style="font-size:1rem;line-height:1.3">${top.hr>0?top.name.split(' ').pop()+' ('+top.hr+')':'—'}</div></div>
    <div class="stat-card"><div class="stat-icon">🔥</div><div class="stat-label">Leading Team</div><div class="stat-val" style="color:${TEAMS[sorted[0]].color}">${lbl(sorted[0])}</div></div>
  </div>`;
}

function renderProjections(){
  const sorted=Object.keys(TEAMS).sort((a,b)=>getProjTotal(b)-getProjTotal(a));
  const emoji=['🥇','🥈','🥉','💀'];
  const cards=sorted.map((k,i)=>{
    const t=TEAMS[k];
    return `<div class="proj-card" style="border-color:${t.color}40;background:${t.color}10">
      <div class="proj-rank" style="color:${t.color}">${emoji[i]}</div>
      <div><div class="proj-team-name" style="color:${t.color}">${lbl(k)}</div><div style="font-size:0.58rem;color:#555;letter-spacing:1px">PROJECTED</div></div>
      <div class="proj-total" style="color:${t.color}">${getProjTotal(k)}</div>
    </div>`;
  }).join('');
  const all=[];
  Object.entries(TEAMS).forEach(([k,t])=>t.players.forEach(p=>{
    if(!p.name)return;
    all.push({...p,tk:k,tc:t.color,proj:PROJ[p.name]||0});
  }));
  all.sort((a,b)=>b.proj-a.proj);
  const max=Math.max(...all.map(p=>p.proj),1);
  const rows=all.map(p=>`<div class="proj-row">
    <span class="pos-tag" style="background:${p.tc}20;color:${p.tc}">${p.pos}</span>
    <span style="flex:1;font-size:0.85rem;font-weight:600;color:#ddd">${p.name}</span>
    <span class="tag" style="background:${p.tc}20;color:${p.tc}">${lbl(p.tk)}</span>
    <div class="proj-bar-wrap"><div class="proj-bar" style="width:${(p.proj/max)*100}%;background:${p.tc}"></div></div>
    <div class="proj-num" style="color:${p.tc}">${p.proj||'—'}</div>
  </div>`).join('');
  return `<div class="proj-title">📊 2026 HR PROJECTIONS</div>
  <div class="proj-sub">STEAMER · ZIPS · THE BAT X CONSENSUS</div>
  <div class="proj-standings">${cards}</div>
  <div style="font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:3px;color:#555;margin-bottom:10px">ALL PLAYERS BY PROJECTED HRs</div>
  ${rows}`;
}

function renderDraft(){
  const teamCards=Object.entries(TEAMS).map(([k,t])=>{
    const open=getOpen(k);
    const drafted=t.players.filter(p=>p.name).length;
    const pills=open.length
      ?open.map(p=>`<span class="pill" style="color:${t.color};border-color:${t.color}60">${p.pos}</span>`).join(' ')
      :`<span style="font-size:0.63rem;color:#06D6A0">FULL ✓</span>`;
    return `<div class="draft-card" style="border-color:${t.color}30;background:${t.color}08">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;color:${t.color}">${lbl(k)}</div>
          <div style="font-size:0.58rem;color:#555;letter-spacing:1px">${drafted}/${t.players.length} FILLED · PROJ ${getProjTotal(k)} HRs</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:0.52rem;color:#444;letter-spacing:1px">OPEN SLOTS</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:${open.length?t.color:'#333'}">${open.length}</div>
        </div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">${pills}</div>
    </div>`;
  }).join('');

  return `<div class="draft-title">🎯 DRAFT STATUS</div>
  <div class="draft-sub">OPEN SLOTS PER TEAM · FINAL ROSTERS</div>
  ${teamCards}`;
}

function renderRules(){
  const rules = [
    { icon:'⚾', title:'1 PT PER HOME RUN', desc:'Every home run hit by a player on your roster earns your team 1 point. Regular season only.' },
    { icon:'🔥', title:'DOUBLE POINTS — FINAL MONTH', desc:'All home runs hit during the final month of the regular season (September + any October regular season games) count for 2 points each. Sprint to the finish.' },
    { icon:'💥', title:'GRAND SLAMS ARE THE TIEBREAKER', desc:'In the event of a tie in total points at season end, the team with the most grand slams wins. Grand slams count for their regular point value during the season — they only serve as tiebreaker if needed.' },
  ];
  const cards = rules.map(r=>`
    <div style="background:#0f0f1a;border:1px solid #1e1e30;border-radius:14px;padding:24px 22px;margin-bottom:14px">
      <div style="font-size:2.2rem;margin-bottom:10px">${r.icon}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;color:#ffaa00;margin-bottom:8px">${r.title}</div>
      <div style="font-size:0.88rem;color:#999;line-height:1.6">${r.desc}</div>
    </div>`).join('');

  return `
    <div style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;color:#ffaa00;margin-bottom:4px">📋 LEAGUE RULES</div>
    <div style="font-size:0.62rem;color:#555;letter-spacing:2px;margin-bottom:20px">2026 DINGERS ONLY POOL · OFFICIAL SCORING</div>
    ${cards}
    <div style="font-size:0.62rem;color:#333;letter-spacing:1px;text-align:center;margin-top:8px">HOUSE RULES — FINAL INTERPRETATION BY COMMISSIONER</div>`;
}

function renderTeam(k){
  const t=TEAMS[k];const tot=getTotal(k);
  const rows=t.players.map((p)=>{
    if(!p.name)return `<div class="player-row empty">
      <span class="pos-tag" style="background:${t.color}18;color:${t.color}">${p.pos}</span>
      <span class="player-name empty-name">— empty —</span>
    </div>`;
    const proj=PROJ[p.name];
    return `<div class="player-row">
      <span class="pos-tag" style="background:${t.color}20;color:${t.color}">${p.pos}</span>
      <span class="player-name">${p.name}</span>
      ${proj?`<span class="proj-badge">proj ${proj}</span>`:''}
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;min-width:34px;text-align:center;color:${p.hr>0?t.color:'rgba(255,255,255,0.25)'}">
        ${p.hr}
      </div>
    </div>`;
  }).join('');
  return `<div class="team-header">
    <div>
      <div class="team-name" style="color:${t.color}">${lbl(k)}'S SQUAD</div>
      <div class="team-sub">${t.players.filter(p=>p.name).length} DRAFTED · PROJ ${getProjTotal(k)} HRs</div>
    </div>
    <div><div class="team-total-label">TOTAL HRs</div><div class="team-total-num" style="color:${t.color}">${tot}</div></div>
  </div>
  <div class="players-list">${rows}</div>`;
}

// ── Daily summary state ────────────────────────────────────────────
let previousHRs = {}; // snapshot before today's sync
let todayHRs = {};    // { playerName: hrsToday }
let dailyLoaded = false;

function capturePrevious(){
  Object.entries(TEAMS).forEach(([k,t]) => {
    t.players.forEach(p => { if(p.name) previousHRs[p.name] = p.hr || 0; });
  });
}

function computeToday(){
  todayHRs = {};
  Object.entries(TEAMS).forEach(([k,t]) => {
    t.players.forEach(p => {
      if(p.name){
        const prev = previousHRs[p.name] || 0;
        const diff = (p.hr||0) - prev;
        if(diff > 0) todayHRs[p.name] = diff;
      }
    });
  });
}

function getTeamOf(name){
  for(const [k,t] of Object.entries(TEAMS)){
    if(t.players.find(p=>p.name===name)) return k;
  }
  return null;
}

function getTodayTeamTotals(){
  const totals = {};
  Object.keys(TEAMS).forEach(k => totals[k]=0);
  Object.entries(todayHRs).forEach(([name,hrs])=>{
    const k = getTeamOf(name);
    if(k) totals[k] += hrs;
  });
  return totals;
}

function renderToday(){
  if(!dailyLoaded){
    return `
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;color:#38bdf8;margin-bottom:4px">📅 TODAY'S SUMMARY</div>
      <div style="font-size:0.62rem;color:#555;letter-spacing:2px;margin-bottom:28px">${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}).toUpperCase()}</div>
      <div style="text-align:center;padding:60px 20px">
        <div style="font-size:3rem;margin-bottom:16px">⏳</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;color:#444">LOADING TODAY'S DATA...</div>
        <div style="font-size:0.65rem;color:#333;letter-spacing:2px;margin-top:8px">PULLING FROM MLB STATS API</div>
      </div>`;
  }

  const todayList = Object.entries(todayHRs).sort((a,b)=>b[1]-a[1]);
  const teamTotals = getTodayTeamTotals();
  const sortedTeams = Object.keys(TEAMS).sort((a,b)=>getTotal(b)-getTotal(a));
  const prevSortedTeams = Object.keys(TEAMS).sort((a,b)=>{
    const prevA = Object.entries(TEAMS[a].players).reduce((s,p)=>s+(previousHRs[p.name]||0),0);
    const prevB = Object.entries(TEAMS[b].players).reduce((s,p)=>s+(previousHRs[p.name]||0),0);
    return prevB - prevA;
  });

  const medals = ['🥇','🥈','🥉','💀'];
  const hotTeam = Object.entries(teamTotals).sort((a,b)=>b[1]-a[1])[0];

  // Today's HRs feed
  const hrFeed = todayList.length > 0
    ? todayList.map(([name, hrs])=>{
        const k = getTeamOf(name);
        const t = TEAMS[k];
        return `<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;background:${t.color}10;border:1px solid ${t.color}30;margin-bottom:6px">
          <div style="font-size:1.6rem">💥</div>
          <div style="flex:1">
            <div style="font-size:0.9rem;font-weight:700;color:#ddd">${name}</div>
            <div style="font-size:0.6rem;color:${t.color};letter-spacing:1px;margin-top:2px">${lbl(k)}</div>
          </div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:${t.color};line-height:1">+${hrs}</div>
        </div>`;
      }).join('')
    : `<div style="text-align:center;padding:30px;color:#444;font-size:0.85rem">No home runs yet today — check back later ⚾</div>`;

  // Standings movement
  const movementRows = sortedTeams.map((k,i)=>{
    const t = TEAMS[k];
    const prevRank = prevSortedTeams.indexOf(k);
    const move = prevRank - i;
    const moveEl = move > 0
      ? `<span style="color:#06D6A0;font-size:0.75rem">▲${move}</span>`
      : move < 0
      ? `<span style="color:#ef4444;font-size:0.75rem">▼${Math.abs(move)}</span>`
      : `<span style="color:#444;font-size:0.75rem">—</span>`;
    const todayPts = teamTotals[k] || 0;
    return `<div style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:10px;background:${t.color}0a;border:1px solid ${t.color}25;margin-bottom:6px">
      <div style="font-size:1.2rem;width:28px;text-align:center">${medals[i]}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:2px;color:${t.color};flex:1">${lbl(k)}</div>
      ${moveEl}
      <div style="font-size:0.65rem;color:#555;text-align:right;min-width:60px">
        <span style="color:${todayPts>0?t.color:'#444'};font-family:'Bebas Neue',sans-serif;font-size:1rem">+${todayPts} today</span>
      </div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:${t.color};min-width:40px;text-align:right">${getTotal(k)}</div>
    </div>`;
  }).join('');

  const hotTeamName = hotTeam && hotTeam[1] > 0 ? lbl(hotTeam[0]) : '—';
  const hotTeamColor = hotTeam && hotTeam[1] > 0 ? TEAMS[hotTeam[0]].color : '#555';
  const hotTeamPts = hotTeam ? hotTeam[1] : 0;

  return `
    <div style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;color:#38bdf8;margin-bottom:4px">📅 TODAY'S SUMMARY</div>
    <div style="font-size:0.62rem;color:#555;letter-spacing:2px;margin-bottom:20px">${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}).toUpperCase()}</div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:22px">
      <div style="background:#0f0f1a;border:1px solid #1e1e30;border-radius:10px;padding:14px">
        <div style="font-size:1.4rem;margin-bottom:4px">💥</div>
        <div style="font-size:0.58rem;color:#555;letter-spacing:2px;margin-bottom:3px">HRs TODAY</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:#38bdf8">${todayList.reduce((s,[,h])=>s+h,0)}</div>
      </div>
      <div style="background:#0f0f1a;border:1px solid #1e1e30;border-radius:10px;padding:14px">
        <div style="font-size:1.4rem;margin-bottom:4px">🔥</div>
        <div style="font-size:0.58rem;color:#555;letter-spacing:2px;margin-bottom:3px">HOT TEAM</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:${hotTeamColor}">${hotTeamName}</div>
        ${hotTeamPts>0?`<div style="font-size:0.6rem;color:${hotTeamColor}">+${hotTeamPts} pts</div>`:''}
      </div>
      <div style="background:#0f0f1a;border:1px solid #1e1e30;border-radius:10px;padding:14px">
        <div style="font-size:1.4rem;margin-bottom:4px">👑</div>
        <div style="font-size:0.58rem;color:#555;letter-spacing:2px;margin-bottom:3px">LEADER</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:${TEAMS[sortedTeams[0]].color}">${lbl(sortedTeams[0])}</div>
        <div style="font-size:0.6rem;color:${TEAMS[sortedTeams[0]].color}">${getTotal(sortedTeams[0])} HRs</div>
      </div>
    </div>

    <div style="font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:3px;color:#38bdf8;margin-bottom:10px">TODAY'S HOME RUNS</div>
    ${hrFeed}

    <div style="font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:3px;color:#38bdf8;margin:20px 0 10px">STANDINGS</div>
    ${movementRows}
    <div style="font-size:0.58rem;color:#333;letter-spacing:1px;text-align:center;margin-top:10px">AUTO-SYNCED ON PAGE LOAD · ${new Date().toLocaleTimeString()}</div>`;
}

function render(){
  renderTabs();
  let content;
  if(activeTab==='LEADERBOARD')content=renderLeaderboard();
  else if(activeTab==='TODAY')content=renderToday();
  else if(activeTab==='PROJECTIONS')content=renderProjections();
  else if(activeTab==='RULES')content=renderRules();
  else if(activeTab==='DRAFT')content=renderDraft();
  else content=renderTeam(activeTab);
  document.getElementById('main').innerHTML=`<div class="page active">${content}</div>`;
}

function switchTab(k){activeTab=k;render();}

// ── MLB Stats API sync (direct — API supports CORS) ───────────────
const SEASON = 2026;

async function syncAllHRs(isAutoLoad=false){
  const btn = document.getElementById('syncBtn');
  if(btn && !isAutoLoad){ btn.textContent='⏳ SYNCING...'; btn.disabled=true; }

  capturePrevious();

  const allPlayers = [];
  Object.entries(TEAMS).forEach(([k,t]) => {
    t.players.forEach(p => { if(p.name && p.mlbId) allPlayers.push({teamKey:k, player:p}); });
  });

  let updated = 0;
  await Promise.all(allPlayers.map(async ({player}) => {
    try {
      const url = `https://statsapi.mlb.com/api/v1/people/${player.mlbId}/stats?stats=season&season=${SEASON}&group=hitting`;
      const res = await fetch(url);
      const data = await res.json();
      const stats = data?.stats?.[0]?.splits?.[0]?.stat;
      if(stats){ player.hr = stats.homeRuns || 0; updated++; }
    } catch(e){ /* silently skip */ }
  }));

  computeToday();
  dailyLoaded = true;

  if(btn && !isAutoLoad){
    btn.textContent = updated > 0 ? `✅ SYNCED (${updated} players)` : '⚠️ NO DATA YET';
    btn.disabled=false;
    setTimeout(()=>{ btn.textContent='🔄 SYNC LIVE HRs'; }, 3000);
  }
  render();
}

// Inject sync button into header after render
function injectSyncBtn(){
  if(document.getElementById('syncBtn')) return;
  const btn = document.createElement('button');
  btn.id='syncBtn';
  btn.textContent='🔄 SYNC LIVE HRs';
  btn.onclick=()=>syncAllHRs(false);
  Object.assign(btn.style,{
    fontFamily:"'Bebas Neue',sans-serif", fontSize:'1rem', letterSpacing:'2px',
    padding:'8px 18px', border:'1px solid #ff444450', background:'#ff444415',
    color:'#ff6666', borderRadius:'8px', cursor:'pointer', marginLeft:'auto',
    whiteSpace:'nowrap'
  });
  const headerInner = document.querySelector('header > div');
  if(headerInner){
    const row = document.createElement('div');
    row.style.cssText='display:flex;justify-content:flex-end;padding:10px 0 4px';
    row.appendChild(btn);
    headerInner.insertBefore(row, headerInner.querySelector('.tabs'));
  }
}

render();
injectSyncBtn();
// Auto-load on page open
syncAllHRs(true);
</script>
